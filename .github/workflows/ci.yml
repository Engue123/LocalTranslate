name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tkinter (needed by one UI-alignment test)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install test dependencies
        # The suite is fully mocked — it never loads a real model — but a few tests
        # import the inference backend, so llama-cpp-python (CPU wheel) is installed.
        run: |
          python -m pip install --upgrade pip
          pip install fonttools customtkinter pytest
          pip install llama-cpp-python

      - name: Run tests
        # Skip the single test that loads a real GGUF model (not available in CI).
        run: pytest --ignore=tests/test_step3.py -q
